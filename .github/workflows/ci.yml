name: CI

on:
  push:
    branches-ignore:
      - "wip*"
    tags:
      - "v*"
  pull_request:
  schedule:
    # Daily at 8:33
    - cron: "33 8 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        arch: [x64, arm64]

    steps:
    - uses: actions/checkout@v4

    - name: Install PyPy (Linux)
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y pypy2

    # setup-python seems broken on ARM64
    # https://github.com/actions/setup-python/issues/547#issuecomment-2746246844
    - name: Install PyPy (macOS)
      if: runner.os == 'macOS'
      run: brew install pypy

    - name: Checkout PyPy
      uses: actions/checkout@v4
      with:
        repository: pypy/pypy
        path: pypy

    - name: Install py.test
      run: pypy -m pip install pytest

    - name: Run Tests
      run: PYTHONPATH=pypy pypy -m pytest tests

    - name: Translate
      run: pypy pypy/rpython/bin/rpython targetrpylean.py

    - name: Run Post-Translation Tests
      run: PYTHONPATH=pypy -m pytest translated-tests

    - name: Upload Translated Binary
      uses: actions/upload-artifact@v4
      with:
        name: rpylean-${{ runner.os }}-${{ matrix.arch }}
        path: ./targetrpylean-c
